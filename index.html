<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Task Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      background: #0b1020;
      overflow-x: hidden;
    }

    .glass {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .fade-up {
      animation: fadeUp .32s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    select option {
      background: #111827;
      color: #f8fafc;
    }

    input, select, textarea, button {
      font: inherit;
    }

    select, input[type="date"], button {
      min-height: 46px;
    }

    textarea {
      resize: vertical;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.9;
      cursor: pointer;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(148,163,184,.25);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-track { background: transparent; }

    .modal-scroll {
      max-height: min(92vh, 860px);
    }

    .modal-body-scroll {
      max-height: calc(min(92vh, 860px) - 108px);
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    @media (max-width: 768px) {
      .mobile-page {
        padding-bottom: calc(104px + env(safe-area-inset-bottom));
      }

      .mobile-nav {
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .modal-scroll {
        max-height: 100dvh;
        border-bottom-left-radius: 0 !important;
        border-bottom-right-radius: 0 !important;
      }

      .modal-body-scroll {
        max-height: calc(100dvh - 96px);
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
      const icons = {
        sun: <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364 6.364-1.414-1.414M8.05 8.05 6.636 6.636m11.728 0-1.414 1.414M8.05 15.95l-1.414 1.414M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z" />,
        moon: <path d="M21 12.79A9 9 0 1 1 11.21 3c0 .34.02.67.05 1A7 7 0 0 0 20 12.74c.33.03.66.05 1 .05Z" />,
        plus: <path d="M12 5v14M5 12h14" />,
        x: <path d="M18 6 6 18M6 6l12 12" />,
        check: <path d="m5 12 5 5L20 7" />,
        trash: <path d="M3 6h18M8 6V4h8v2m-9 0v14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V6M10 11v6M14 11v6" />,
        search: <path d="m21 21-4.35-4.35M18 10.5a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" />,
        filter: <path d="M4 6h16M7 12h10M10 18h4" />,
        download: <path d="M12 3v11m0 0 4-4m-4 4-4-4M4 17v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" />,
        upload: <path d="M12 21V10m0 0 4 4m-4-4-4 4M4 7V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v1" />,
        chart: <path d="M4 19V5m0 14h16M8 17V9m4 8V5m4 12v-6" />,
        list: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />,
        settings: <path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8Zm8 4-.88.51a7.97 7.97 0 0 1-.43 1.04l.5.9-1.41 1.41-.9-.5c-.33.18-.68.33-1.04.43L15 20h-2l-.51-.88a7.97 7.97 0 0 1-1.04-.43l-.9.5-1.41-1.41.5-.9a7.97 7.97 0 0 1-.43-1.04L4 15v-2l.88-.51c.1-.36.25-.71.43-1.04l-.5-.9 1.41-1.41.9.5c.33-.18.68-.33 1.04-.43L9 4h2l.51.88c.36.1.71.25 1.04.43l.9-.5 1.41 1.41-.5.9c.18.33.33.68.43 1.04L20 9v2Z" />,
        calendar: <path d="M8 3v3M16 3v3M4 9h16M5 5h14a1 1 0 0 1 1 1v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1Z" />,
        star: <path d="m12 3 2.7 5.47 6.03.88-4.36 4.25 1.03 6-5.4-2.84-5.4 2.84 1.03-6L3.27 9.35l6.03-.88L12 3Z" />,
        archive: <path d="M3 7h18M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-12M9 11h6" />,
        spark: <path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8L12 2Z" />,
        clock: <path d="M12 7v5l3 3M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />,
        target: <path d="M12 12m-8 0a8 8 0 1 0 16 0a8 8 0 1 0 -16 0M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0M12 2v2M22 12h-2M12 22v-2M2 12h2" />,
        pin: <path d="m15 3 6 6-4 1-3 7-2-2 1-4-4-4 6-4Z" />
      };
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size} className={className}>
          {icons[name] || null}
        </svg>
      );
    };

    const CATEGORIES = [
      { id: 'work', label: 'Work', emoji: '💼' },
      { id: 'personal', label: 'Personal', emoji: '👤' }
    ];

    const PRIORITIES = [
      { id: 'low', label: 'Low' },
      { id: 'medium', label: 'Medium' },
      { id: 'high', label: 'High' },
      { id: 'critical', label: 'Critical' }
    ];

    const STORAGE_KEY = 'pulse_task_tracker_v2';
    const SETTINGS_KEY = 'pulse_task_tracker_settings_v2';

    const defaultSettings = {
      darkMode: true,
      compactMode: false,
      showCompleted: true,
      accent: 'indigo'
    };

    const accentMap = {
      indigo: {
        solid: 'bg-indigo-600',
        soft: 'bg-indigo-500/10',
        text: 'text-indigo-400',
        border: 'border-indigo-500/30',
        ring: 'ring-indigo-500/30'
      },
      emerald: {
        solid: 'bg-emerald-600',
        soft: 'bg-emerald-500/10',
        text: 'text-emerald-400',
        border: 'border-emerald-500/30',
        ring: 'ring-emerald-500/30'
      },
      rose: {
        solid: 'bg-rose-600',
        soft: 'bg-rose-500/10',
        text: 'text-rose-400',
        border: 'border-rose-500/30',
        ring: 'ring-rose-500/30'
      },
      amber: {
        solid: 'bg-amber-500',
        soft: 'bg-amber-500/10',
        text: 'text-amber-400',
        border: 'border-amber-500/30',
        ring: 'ring-amber-500/30'
      }
    };

    const uid = () => `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;

    const formatDate = (value) => {
      if (!value) return 'No due date';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return 'No due date';
      return d.toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
    };

    const isOverdue = (task) => task.dueDate && !task.completed && new Date(task.dueDate) < new Date(new Date().toDateString());
    const isToday = (task) => {
      if (!task.dueDate) return false;
      const d = new Date(task.dueDate);
      const now = new Date();
      return d.toDateString() === now.toDateString();
    };

    function parseChecklist(text = '') {
      const lines = text.split('\n');
      const title = lines[0] || '';
      const subItems = lines.slice(1).filter((l) => /^\[( |x)\]/i.test(l.trim()));
      const completedCount = subItems.filter((l) => /^\[x\]/i.test(l.trim())).length;
      return { title, subItems, total: subItems.length, completedCount };
    }

    function getPriorityTone(priority) {
      if (priority === 'critical') return 'bg-rose-500 text-white';
      if (priority === 'high') return 'bg-orange-500 text-white';
      if (priority === 'medium') return 'bg-amber-400 text-slate-950';
      return 'bg-slate-300 text-slate-900 dark:bg-slate-700 dark:text-slate-100';
    }

    function App() {
      const [tasks, setTasks] = useState(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      });

      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem(SETTINGS_KEY);
        return saved ? { ...defaultSettings, ...JSON.parse(saved) } : defaultSettings;
      });

      const [view, setView] = useState('board');
      const [search, setSearch] = useState('');
      const [filterCategory, setFilterCategory] = useState('all');
      const [filterPriority, setFilterPriority] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [sortBy, setSortBy] = useState('newest');
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [toast, setToast] = useState(null);
      const [archive, setArchive] = useState([]);
      const fileInputRef = useRef(null);

      const [form, setForm] = useState({
        title: '',
        details: '',
        category: 'work',
        priority: 'medium',
        dueDate: '',
        pinned: false,
        favorite: false
      });

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }, [tasks]);

      useEffect(() => {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      }, [settings]);

      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 2500);
        return () => clearTimeout(t);
      }, [toast]);

      const accent = accentMap[settings.accent] || accentMap.indigo;

      const showToast = (message) => setToast(message);

      const resetForm = () => {
        setForm({
          title: '',
          details: '',
          category: 'work',
          priority: 'medium',
          dueDate: '',
          pinned: false,
          favorite: false
        });
        setEditingId(null);
      };

      const openNewTask = () => {
        resetForm();
        setShowAddModal(true);
      };

      const openEditTask = (task) => {
        const lines = task.text.split('\n');
        setForm({
          title: lines[0] || '',
          details: lines.slice(1).join('\n'),
          category: task.category,
          priority: task.priority,
          dueDate: task.dueDate || '',
          pinned: !!task.pinned,
          favorite: !!task.favorite
        });
        setEditingId(task.id);
        setShowAddModal(true);
      };

      const saveTask = (e) => {
        e.preventDefault();
        if (!form.title.trim()) return;
        const fullText = [form.title.trim(), form.details.trim()].filter(Boolean).join('\n');

        if (editingId) {
          setTasks((prev) => prev.map((task) => task.id === editingId ? {
            ...task,
            text: fullText,
            category: form.category,
            priority: form.priority,
            dueDate: form.dueDate || '',
            pinned: form.pinned,
            favorite: form.favorite,
            updatedAt: new Date().toISOString()
          } : task));
          showToast('Task updated');
        } else {
          const task = {
            id: uid(),
            text: fullText,
            category: form.category,
            priority: form.priority,
            dueDate: form.dueDate || '',
            pinned: form.pinned,
            favorite: form.favorite,
            completed: false,
            archived: false,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            completedAt: null
          };
          setTasks((prev) => [task, ...prev]);
          showToast('Task added');
        }

        setShowAddModal(false);
        resetForm();
      };

      const toggleTask = (id) => {
        setTasks((prev) => prev.map((task) => {
          if (task.id !== id) return task;
          const completed = !task.completed;
          return {
            ...task,
            completed,
            completedAt: completed ? new Date().toISOString() : null,
            updatedAt: new Date().toISOString()
          };
        }));
        showToast('Task status updated');
      };

      const deleteTask = (id) => {
        setTasks((prev) => prev.filter((task) => task.id !== id));
        showToast('Task deleted');
      };

      const archiveTask = (id) => {
        const task = tasks.find((t) => t.id === id);
        if (!task) return;
        setArchive((prev) => [task, ...prev]);
        setTasks((prev) => prev.filter((t) => t.id !== id));
        showToast('Task archived');
      };

      const restoreArchived = (id) => {
        const task = archive.find((a) => a.id === id);
        if (!task) return;
        setTasks((prev) => [{ ...task, updatedAt: new Date().toISOString() }, ...prev]);
        setArchive((prev) => prev.filter((a) => a.id !== id));
        showToast('Task restored');
      };

      const toggleFavorite = (id) => {
        setTasks((prev) => prev.map((task) => task.id === id ? { ...task, favorite: !task.favorite, updatedAt: new Date().toISOString() } : task));
      };

      const togglePinned = (id) => {
        setTasks((prev) => prev.map((task) => task.id === id ? { ...task, pinned: !task.pinned, updatedAt: new Date().toISOString() } : task));
      };

      const toggleSubItem = (taskId, label) => {
        setTasks((prev) => prev.map((task) => {
          if (task.id !== taskId) return task;
          const lines = task.text.split('\n');
          const updated = lines.map((line) => {
            const clean = line.replace(/^\[( |x)\]\s*/i, '');
            if (clean !== label) return line;
            if (/^\[x\]/i.test(line)) return line.replace(/^\[x\]/i, '[ ]');
            if (/^\[ \]/i.test(line)) return line.replace(/^\[ \]/i, '[x]');
            return line;
          });
          return { ...task, text: updated.join('\n'), updatedAt: new Date().toISOString() };
        }));
      };

      const exportJson = () => {
        const payload = JSON.stringify(tasks, null, 2);
        const blob = new Blob([payload], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pulse-task-tracker-data.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('JSON exported');
      };

      const importJson = (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (!Array.isArray(imported)) throw new Error('Invalid format');
            const valid = imported.filter((t) => t.id && t.text);
            setTasks((prev) => {
              const ids = new Set(prev.map((t) => t.id));
              const fresh = valid.filter((t) => !ids.has(t.id));
              return [...fresh, ...prev];
            });
            showToast(`Imported ${valid.length} task(s)`);
          } catch {
            showToast('Import failed');
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      };

      const filteredTasks = useMemo(() => {
        let list = [...tasks];

        list = list.filter((task) => {
          const text = task.text.toLowerCase();
          const query = search.toLowerCase();
          const matchesSearch = !query || text.includes(query);
          const matchesCategory = filterCategory === 'all' || task.category === filterCategory;
          const matchesPriority = filterPriority === 'all' || task.priority === filterPriority;
          const matchesStatus = filterStatus === 'all'
            || (filterStatus === 'completed' && task.completed)
            || (filterStatus === 'active' && !task.completed)
            || (filterStatus === 'overdue' && isOverdue(task))
            || (filterStatus === 'today' && isToday(task))
            || (filterStatus === 'favorite' && task.favorite);
          const completedVisible = settings.showCompleted ? true : !task.completed;
          return matchesSearch && matchesCategory && matchesPriority && matchesStatus && completedVisible;
        });

        list.sort((a, b) => {
          if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
          if (sortBy === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
          if (sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
          if (sortBy === 'dueSoon') {
            if (!a.dueDate && !b.dueDate) return 0;
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return new Date(a.dueDate) - new Date(b.dueDate);
          }
          if (sortBy === 'priority') {
            const rank = { critical: 4, high: 3, medium: 2, low: 1 };
            return rank[b.priority] - rank[a.priority];
          }
          if (sortBy === 'alphabetical') {
            return parseChecklist(a.text).title.localeCompare(parseChecklist(b.text).title);
          }
          return 0;
        });

        return list;
      }, [tasks, search, filterCategory, filterPriority, filterStatus, sortBy, settings.showCompleted]);

      const stats = useMemo(() => {
        const total = tasks.length;
        const completed = tasks.filter((t) => t.completed).length;
        const active = total - completed;
        const overdue = tasks.filter((t) => isOverdue(t)).length;
        const favorites = tasks.filter((t) => t.favorite).length;
        const completionRate = total ? Math.round((completed / total) * 100) : 0;

        const completedTasks = tasks.filter((t) => t.completed && t.completedAt);
        let avgTime = '0m';
        if (completedTasks.length) {
          const totalMins = completedTasks.reduce((sum, task) => sum + ((new Date(task.completedAt) - new Date(task.createdAt)) / 60000), 0);
          const avgMins = Math.max(0, Math.round(totalMins / completedTasks.length));
          avgTime = avgMins >= 60 ? `${Math.floor(avgMins / 60)}h ${avgMins % 60}m` : `${avgMins}m`;
        }

        const categoryBreakdown = CATEGORIES.map((cat) => ({
          ...cat,
          count: tasks.filter((t) => t.category === cat.id).length
        }));

        const dailyData = Array.from({ length: 7 }).map((_, i) => {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const ds = d.toDateString();
          return {
            day: d.toLocaleDateString(undefined, { weekday: 'short' }),
            created: tasks.filter((t) => new Date(t.createdAt).toDateString() === ds).length,
            completed: tasks.filter((t) => t.completedAt && new Date(t.completedAt).toDateString() === ds).length
          };
        }).reverse();

        return { total, completed, active, overdue, favorites, completionRate, avgTime, categoryBreakdown, dailyData };
      }, [tasks]);

      const boardGroups = useMemo(() => ({
        overdue: filteredTasks.filter((t) => isOverdue(t)),
        today: filteredTasks.filter((t) => isToday(t) && !isOverdue(t)),
        upcoming: filteredTasks.filter((t) => !t.completed && !isOverdue(t) && !isToday(t)),
        done: filteredTasks.filter((t) => t.completed)
      }), [filteredTasks]);

      const themeBg = settings.darkMode
        ? 'bg-[radial-gradient(circle_at_top,_rgba(99,102,241,0.20),_transparent_30%),linear-gradient(180deg,#0b1020_0%,#0b1220_100%)] text-slate-100'
        : 'bg-[radial-gradient(circle_at_top,_rgba(99,102,241,0.12),_transparent_26%),linear-gradient(180deg,#eef2ff_0%,#f8fafc_100%)] text-slate-900';

      const cardBg = settings.darkMode
        ? 'bg-white/5 border-white/10 shadow-[0_20px_60px_rgba(0,0,0,0.35)]'
        : 'bg-white/80 border-slate-200/80 shadow-[0_18px_60px_rgba(15,23,42,0.10)]';

      const muted = settings.darkMode ? 'text-slate-400' : 'text-slate-500';
      const inputBg = settings.darkMode ? 'bg-white/5 border-white/10 text-white placeholder:text-slate-500' : 'bg-white border-slate-200 text-slate-900 placeholder:text-slate-400';

      const TaskCard = ({ task }) => {
        const { title, subItems, total, completedCount } = parseChecklist(task.text);
        const percent = total ? Math.round((completedCount / total) * 100) : 0;
        const category = CATEGORIES.find((c) => c.id === task.category);

        return (
          <div className={`rounded-3xl border p-4 md:p-5 glass ${cardBg} fade-up ${task.completed ? 'opacity-70' : ''}`}>
            <div className="flex items-start gap-3">
              <button
                onClick={() => toggleTask(task.id)}
                className={`mt-1 h-6 w-6 shrink-0 rounded-lg border flex items-center justify-center transition ${task.completed ? `${accent.solid} border-transparent text-white` : settings.darkMode ? 'border-white/20 hover:border-white/40' : 'border-slate-300 hover:border-slate-400'}`}
              >
                {task.completed && <Icon name="check" size={14} />}
              </button>

              <div className="min-w-0 flex-1">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <div className="flex flex-wrap items-center gap-2 mb-2">
                      {task.pinned && <span className={`inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${accent.soft} ${accent.text}`}><Icon name="pin" size={12} /> Pinned</span>}
                      {task.favorite && <span className="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-amber-400/15 text-amber-300"><Icon name="star" size={12} /> Favorite</span>}
                      {isOverdue(task) && <span className="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-rose-500/15 text-rose-300">Overdue</span>}
                      {isToday(task) && !task.completed && <span className="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-sky-500/15 text-sky-300">Today</span>}
                    </div>
                    <h3 className={`text-base md:text-lg font-bold leading-snug ${task.completed ? 'line-through text-slate-400' : ''}`}>{title}</h3>
                  </div>

                  <div className="flex items-center gap-1">
                    <button onClick={() => toggleFavorite(task.id)} className={`rounded-xl p-2 ${settings.darkMode ? 'hover:bg-white/10' : 'hover:bg-slate-100'} ${task.favorite ? 'text-amber-400' : muted}`}><Icon name="star" size={16} /></button>
                    <button onClick={() => togglePinned(task.id)} className={`rounded-xl p-2 ${settings.darkMode ? 'hover:bg-white/10' : 'hover:bg-slate-100'} ${task.pinned ? accent.text : muted}`}><Icon name="pin" size={16} /></button>

                          <button onClick={() => restoreArchived(task.id)} className={`rounded-xl px-3 py-2 text-xs font-semibold ${accent.soft} ${accent.text}`}>Restore</button>
                        </div>
                      )) : <div className={`text-sm ${muted}`}>No archived tasks</div>}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {toast && (
            <div className="fixed left-1/2 top-5 z-[90] -translate-x-1/2">
              <div className={`rounded-2xl border px-4 py-3 text-sm font-semibold glass ${cardBg}`}>{toast}</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
